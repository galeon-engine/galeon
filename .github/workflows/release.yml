# Tag-triggered release pipeline for Rust crates and npm packages.
# Mirrors the gametau publish.yml pattern.
#
# Primary trigger: push a v* tag.
# Fallback: workflow_dispatch with explicit version for verify-only.
#
# Requires secret: CARGO_REGISTRY_TOKEN (crates.io API token).
# npm uses trusted publishing (OIDC provenance).

name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to verify (e.g. 0.5.0). Skips publish, runs verification only.'
        required: true

jobs:
  ci:
    if: github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/ci.yml

  publish-crates:
    if: github.event_name != 'workflow_dispatch'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Resolve workspace version
        run: |
          workspace_version="$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)"
          echo "VERSION=${workspace_version}" >> "$GITHUB_ENV"

      - name: Publish galeon-engine-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          output="$(cargo publish -p galeon-engine-macros 2>&1)"
          status=$?
          set -e
          echo "$output"
          if [ $status -eq 0 ]; then exit 0; fi
          if [[ "$output" == *"already exists on crates.io index"* ]]; then
            echo "galeon-engine-macros v${VERSION} already published; skipping."
            exit 0
          fi
          exit $status

      - name: Wait for crates.io index propagation
        run: |
          echo "Waiting for galeon-engine-macros v${VERSION} on crates.io..."
          for attempt in $(seq 1 30); do
            result="$(cargo search galeon-engine-macros --limit 1 || true)"
            if [[ "$result" == *"\"$VERSION\""* ]]; then
              echo "galeon-engine-macros v${VERSION} is visible."
              exit 0
            fi
            echo "Not indexed yet (attempt ${attempt}/30). Waiting 10s..."
            sleep 10
          done
          echo "Timed out; proceeding with publish retries."

      - name: Publish galeon-engine
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in $(seq 1 30); do
            set +e
            output="$(cargo publish -p galeon-engine 2>&1)"
            status=$?
            set -e
            echo "$output"
            if [ $status -eq 0 ]; then exit 0; fi
            if [[ "$output" == *"already exists on crates.io index"* ]]; then
              echo "galeon-engine v${VERSION} already published; skipping."
              exit 0
            fi
            if [[ "$output" == *"failed to select a version"* ]] && [[ "$output" == *"galeon-engine-macros"* ]]; then
              echo "galeon-engine-macros still propagating (attempt ${attempt}/30). Waiting 10s..."
              sleep 10
              continue
            fi
            exit $status
          done
          echo "Timed out waiting for galeon-engine-macros dependency."
          exit 1

      - name: Publish galeon-engine-three-sync
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in $(seq 1 30); do
            set +e
            output="$(cargo publish -p galeon-engine-three-sync 2>&1)"
            status=$?
            set -e
            echo "$output"
            if [ $status -eq 0 ]; then exit 0; fi
            if [[ "$output" == *"already exists on crates.io index"* ]]; then
              echo "galeon-engine-three-sync v${VERSION} already published; skipping."
              exit 0
            fi
            if [[ "$output" == *"failed to select a version"* ]] && [[ "$output" == *"galeon-engine"* ]]; then
              echo "galeon-engine still propagating (attempt ${attempt}/30). Waiting 10s..."
              sleep 10
              continue
            fi
            exit $status
          done
          echo "Timed out waiting for galeon-engine dependency."
          exit 1

      - name: Publish galeon-engine-terrain
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in $(seq 1 30); do
            set +e
            output="$(cargo publish -p galeon-engine-terrain 2>&1)"
            status=$?
            set -e
            echo "$output"
            if [ $status -eq 0 ]; then exit 0; fi
            if [[ "$output" == *"already exists on crates.io index"* ]]; then
              echo "galeon-engine-terrain v${VERSION} already published; skipping."
              exit 0
            fi
            if [[ "$output" == *"failed to select a version"* ]] && [[ "$output" == *"galeon-engine-three-sync"* ]]; then
              echo "galeon-engine-three-sync still propagating (attempt ${attempt}/30). Waiting 10s..."
              sleep 10
              continue
            fi
            exit $status
          done
          echo "Timed out waiting for galeon-engine-three-sync dependency."
          exit 1

  publish-npm:
    if: github.event_name != 'workflow_dispatch'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install

      - name: Build packages
        run: bunx tsc --build

      - name: Resolve npm dist-tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "$version" == *-* ]]; then
            dist_tag="alpha"
          else
            dist_tag="latest"
          fi
          echo "NPM_DIST_TAG=${dist_tag}" >> "$GITHUB_ENV"
          echo "Using npm dist-tag '${dist_tag}' for v${version}."

      - name: Publish @galeon/runtime
        run: |
          version="${GITHUB_REF_NAME#v}"
          if npm view "@galeon/runtime@${version}" version >/dev/null 2>&1; then
            echo "@galeon/runtime@${version} already published; skipping."
            exit 0
          fi
          cd packages/runtime
          npm publish --access public --tag "$NPM_DIST_TAG" --provenance

      - name: Publish @galeon/render-core
        run: |
          version="${GITHUB_REF_NAME#v}"
          if npm view "@galeon/render-core@${version}" version >/dev/null 2>&1; then
            echo "@galeon/render-core@${version} already published; skipping."
            exit 0
          fi
          cd packages/render-core
          npm publish --access public --tag "$NPM_DIST_TAG" --provenance

      - name: Publish @galeon/three
        run: |
          version="${GITHUB_REF_NAME#v}"
          if npm view "@galeon/three@${version}" version >/dev/null 2>&1; then
            echo "@galeon/three@${version} already published; skipping."
            exit 0
          fi
          cd packages/three
          npm publish --access public --tag "$NPM_DIST_TAG" --provenance

      - name: Publish @galeon/shell
        run: |
          version="${GITHUB_REF_NAME#v}"
          if npm view "@galeon/shell@${version}" version >/dev/null 2>&1; then
            echo "@galeon/shell@${version} already published; skipping."
            exit 0
          fi
          cd packages/shell
          npm publish --access public --tag "$NPM_DIST_TAG" --provenance

      - name: Publish @galeon/picking
        run: |
          version="${GITHUB_REF_NAME#v}"
          if npm view "@galeon/picking@${version}" version >/dev/null 2>&1; then
            echo "@galeon/picking@${version} already published; skipping."
            exit 0
          fi
          cd packages/picking
          npm publish --access public --tag "$NPM_DIST_TAG" --provenance

      - name: Publish @galeon/r3f
        run: |
          version="${GITHUB_REF_NAME#v}"
          if npm view "@galeon/r3f@${version}" version >/dev/null 2>&1; then
            echo "@galeon/r3f@${version} already published; skipping."
            exit 0
          fi
          cd packages/r3f
          npm publish --access public --tag "$NPM_DIST_TAG" --provenance

  publish-cli:
    if: github.event_name != 'workflow_dispatch'
    needs: publish-crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish galeon-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          output="$(cargo publish -p galeon-cli 2>&1)"
          status=$?
          set -e
          echo "$output"
          if [ $status -eq 0 ]; then exit 0; fi
          if [[ "$output" == *"already exists on crates.io index"* ]]; then
            echo "galeon-cli already published; skipping."
            exit 0
          fi
          exit $status

  verify-publish:
    name: Verify Published Artifacts
    needs: [publish-npm, publish-crates, publish-cli]
    if: >-
      always() && !cancelled() && (
        github.event_name == 'workflow_dispatch' ||
        (
          needs.publish-npm.result == 'success' &&
          needs.publish-crates.result == 'success' &&
          needs.publish-cli.result == 'success'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "Verifying published artifacts for v${version}"

      - name: Wait for registry propagation
        if: github.event_name != 'workflow_dispatch'
        run: sleep 60

      - name: Verify crate — galeon-engine
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          cargo init --name verify-galeon
          cargo add "galeon-engine@=${VERSION}"
          cargo check

      - name: Verify crate — galeon-engine-terrain
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          cargo init --name verify-galeon-terrain
          cargo add "galeon-engine-terrain@=${VERSION}"
          cargo check

      - name: Verify npm packages
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          npm init -y
          npm install \
            "react@^18.3.1" \
            "react-dom@^18.3.1" \
            "@react-three/fiber@^8.18.0" \
            "three@^0.183.2" \
            "typescript@^5" \
            "@galeon/runtime@${VERSION}" \
            "@galeon/render-core@${VERSION}" \
            "@galeon/three@${VERSION}" \
            "@galeon/picking@${VERSION}" \
            "@galeon/r3f@${VERSION}" \
            "@galeon/shell@${VERSION}"
          node -e "Promise.all(['@galeon/runtime','@galeon/render-core','@galeon/three','@galeon/picking','@galeon/r3f','@galeon/shell'].map((pkg) => import(pkg))).then(() => console.log('@galeon npm packages OK'))"

      - name: Verify CLI — installed binary starter bootstrap
        run: |
          : "${VERSION:?Resolve version step did not set VERSION}"
          export GALEON_REQUIRE_PUBLISHED=1
          export GALEON_INSTALL_VERSION="${VERSION}"
          bash tests/local-first-starter-smoke.sh

  release-evidence:
    name: Release Evidence Bundle
    needs: [publish-npm, publish-crates, publish-cli, verify-publish]
    if: >-
      always() && !cancelled() &&
      needs.verify-publish.result == 'success' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          needs.publish-npm.result == 'success' &&
          needs.publish-crates.result == 'success' &&
          needs.publish-cli.result == 'success'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - name: Build evidence markdown
        env:
          PUBLISH_CLI_RESULT: ${{ needs.publish-cli.result }}
          PUBLISH_NPM_RESULT: ${{ needs.publish-npm.result }}
          PUBLISH_CRATES_RESULT: ${{ needs.publish-crates.result }}
          VERIFY_RESULT: ${{ needs.verify-publish.result }}
        run: |
          mkdir -p .release-evidence
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          cat <<EOF > ".release-evidence/release-evidence-v${VERSION}.md"
          # Release Evidence — v${VERSION}

          ## Workflow Summary
          - Run URL: ${run_url}
          - publish-crates: ${PUBLISH_CRATES_RESULT}
          - publish-npm: ${PUBLISH_NPM_RESULT}
          - publish-cli: ${PUBLISH_CLI_RESULT}
          - verify-publish: ${VERIFY_RESULT}

          ## References
          - Tag: v${VERSION}
          - Workflow run: ${run_url}
          EOF
          cat ".release-evidence/release-evidence-v${VERSION}.md" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: release-evidence-v${{ env.VERSION }}
          path: .release-evidence
          if-no-files-found: error
          include-hidden-files: true

  github-release:
    name: GitHub Release
    needs: [publish-npm, publish-crates, publish-cli, verify-publish, release-evidence]
    if: >-
      github.event_name != 'workflow_dispatch' &&
      !cancelled() &&
      needs.publish-npm.result == 'success' &&
      needs.publish-crates.result == 'success' &&
      needs.publish-cli.result == 'success' &&
      needs.verify-publish.result == 'success' &&
      needs.release-evidence.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-evidence-${{ github.ref_name }}
          path: .release-evidence

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          evidence=".release-evidence/release-evidence-v${version}.md"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub Release ${tag} already exists; refreshing attached evidence."
            gh release upload "$tag" "${evidence}#Release Evidence" --clobber
            if [[ "$version" == *-* ]]; then
              gh release edit "$tag" --title "$tag" --prerelease
            else
              gh release edit "$tag" --title "$tag" --latest
            fi
            exit 0
          fi

          if [[ "$version" == *-* ]]; then
            gh release create "$tag" "${evidence}#Release Evidence" \
              --title "$tag" \
              --generate-notes \
              --verify-tag \
              --prerelease \
              --latest=false
          else
            gh release create "$tag" "${evidence}#Release Evidence" \
              --title "$tag" \
              --generate-notes \
              --verify-tag \
              --latest
          fi
