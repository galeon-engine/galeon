# Tag-triggered release pipeline for Rust crates and npm packages.
#
# Primary trigger: push a v* tag (e.g. v0.2.0, v0.2.0-alpha.1).
# Fallback: workflow_dispatch runs verify-only (no publish).
#
# Flow: CI gate → publish crates → publish npm → verify → evidence
#
# Requires secret: CARGO_REGISTRY_TOKEN (crates.io API token).
# npm uses trusted publishing (OIDC provenance) — no token needed after setup.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── CI gate (reuses ci.yml via workflow_call) ──────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Extract version from tag or Cargo.toml ─────────────────────────
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_tag: ${{ steps.ver.outputs.is_tag }}
      is_prerelease: ${{ steps.ver.outputs.is_prerelease }}
      npm_tag: ${{ steps.ver.outputs.npm_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          set -e
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Check tag matches Cargo.toml version (fast-fail on mismatch)
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            CARGO_VER=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
            if [ "$VERSION" != "$CARGO_VER" ]; then
              echo "::error::Tag version ($VERSION) does not match Cargo.toml ($CARGO_VER)"
              exit 1
            fi
          fi

          # Prerelease detection and npm dist-tag
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            # Extract first prerelease segment: 0.2.0-alpha.1 → alpha,
            # 0.2.0-alpha-canary.1 → alpha, 0.2.0-0.1 → pre (fallback)
            PRE_PART="${VERSION#*-}"          # alpha.1, alpha-canary.1, 0.1
            PRE_SEG="${PRE_PART%%[.-]*}"      # alpha, alpha, 0
            if [[ "$PRE_SEG" =~ ^[a-zA-Z] ]]; then
              echo "npm_tag=$PRE_SEG" >> "$GITHUB_OUTPUT"
            else
              echo "npm_tag=pre" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate lockstep dependency pins
        run: |
          set -e
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          ERRORS=0

          # Rust internal dependency pins
          MACROS_PIN=$(grep 'galeon-engine-macros' crates/engine/Cargo.toml | grep -o '"=[^"]*"' | tr -d '"')
          if [ "$MACROS_PIN" != "=$VERSION" ]; then
            echo "::error::crates/engine/Cargo.toml pins galeon-engine-macros at $MACROS_PIN, expected =$VERSION"
            ERRORS=$((ERRORS + 1))
          fi

          ENGINE_PIN=$(grep 'galeon-engine ' crates/engine-three-sync/Cargo.toml | grep -o '"=[^"]*"' | tr -d '"')
          if [ "$ENGINE_PIN" != "=$VERSION" ]; then
            echo "::error::crates/engine-three-sync/Cargo.toml pins galeon-engine at $ENGINE_PIN, expected =$VERSION"
            ERRORS=$((ERRORS + 1))
          fi

          # npm package versions
          for PKG in packages/runtime/package.json packages/engine-ts/package.json packages/shell/package.json; do
            PKG_VER=$(node -e "import{readFileSync}from'fs';const p=JSON.parse(readFileSync('./$PKG','utf8'));console.log(p.version||'')" --input-type=module)
            if [ "$PKG_VER" != "$VERSION" ]; then
              echo "::error::$PKG version is $PKG_VER, expected $VERSION"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # npm internal dependency pin
          RUNTIME_PIN=$(node -e "import{readFileSync}from'fs';const p=JSON.parse(readFileSync('./packages/engine-ts/package.json','utf8'));console.log(p.dependencies['@galeon/runtime']||'')" --input-type=module)
          if [ "$RUNTIME_PIN" != "=$VERSION" ]; then
            echo "::error::packages/engine-ts/package.json pins @galeon/runtime at $RUNTIME_PIN, expected =$VERSION"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS lockstep pin(s) do not match version $VERSION"
            exit 1
          fi
          echo "All lockstep pins match $VERSION"

  # ── Publish Rust crates ────────────────────────────────────────────
  publish-crates:
    name: Publish Rust crates
    needs: [ci, resolve-version]
    if: needs.resolve-version.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Publish galeon-engine-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          # Skip if already published
          if cargo search galeon-engine-macros --limit 1 | grep -q "\"$VERSION\""; then
            echo "galeon-engine-macros@$VERSION already published, skipping"
          else
            cargo publish -p galeon-engine-macros
          fi

      - name: Wait for galeon-engine-macros on crates.io
        run: |
          set -e
          echo "Polling crates.io for galeon-engine-macros@$VERSION..."
          for i in $(seq 1 30); do
            if cargo search galeon-engine-macros --limit 1 | grep -q "\"$VERSION\""; then
              echo "Found after attempt $i"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::galeon-engine-macros@$VERSION not found after 30 attempts"
              exit 1
            fi
            sleep 10
          done

      - name: Publish galeon-engine
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          if cargo search galeon-engine --limit 1 | grep -q "\"$VERSION\""; then
            echo "galeon-engine@$VERSION already published, skipping"
          else
            cargo publish -p galeon-engine
          fi

      - name: Wait for galeon-engine on crates.io
        run: |
          set -e
          echo "Polling crates.io for galeon-engine@$VERSION..."
          for i in $(seq 1 30); do
            if cargo search galeon-engine --limit 1 | grep -q "\"$VERSION\""; then
              echo "Found after attempt $i"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::galeon-engine@$VERSION not found after 30 attempts"
              exit 1
            fi
            sleep 10
          done

      - name: Publish galeon-engine-three-sync
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          if cargo search galeon-engine-three-sync --limit 1 | grep -q "\"$VERSION\""; then
            echo "galeon-engine-three-sync@$VERSION already published, skipping"
          else
            cargo publish -p galeon-engine-three-sync
          fi

  # ── Publish npm packages ───────────────────────────────────────────
  publish-npm:
    name: Publish npm packages
    needs: [ci, resolve-version]
    if: needs.resolve-version.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
      NPM_TAG: ${{ needs.resolve-version.outputs.npm_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install

      - name: Build packages
        run: bunx tsc --build

      - name: Publish @galeon/runtime
        run: |
          set -e
          if npm view @galeon/runtime@"$VERSION" version 2>/dev/null; then
            echo "@galeon/runtime@$VERSION already published, skipping"
          else
            npm publish --workspace=packages/runtime --provenance --access public --tag "$NPM_TAG"
          fi

      - name: Publish @galeon/engine-ts
        run: |
          set -e
          if npm view @galeon/engine-ts@"$VERSION" version 2>/dev/null; then
            echo "@galeon/engine-ts@$VERSION already published, skipping"
          else
            npm publish --workspace=packages/engine-ts --provenance --access public --tag "$NPM_TAG"
          fi

      - name: Publish @galeon/shell
        run: |
          set -e
          if npm view @galeon/shell@"$VERSION" version 2>/dev/null; then
            echo "@galeon/shell@$VERSION already published, skipping"
          else
            npm publish --workspace=packages/shell --provenance --access public --tag "$NPM_TAG"
          fi

  # ── Post-publish verification ──────────────────────────────────────
  verify-publish:
    name: Verify published artifacts
    needs: [resolve-version, publish-crates, publish-npm]
    # Run after publish on tag, or directly after CI on manual dispatch
    if: always() && needs.resolve-version.result == 'success'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify Rust crate
        run: |
          set -e
          cd "$(mktemp -d)"
          cargo init --name verify-galeon
          cargo add galeon-engine@"=$VERSION"
          cargo check
          echo "✓ galeon-engine@$VERSION installs and checks from crates.io"

      - name: Verify npm package
        run: |
          set -e
          cd "$(mktemp -d)"
          npm init -y
          npm install @galeon/runtime@"$VERSION"
          node -e "import('@galeon/runtime').then(() => console.log('✓ ESM import OK'))"
          echo "✓ @galeon/runtime@$VERSION installs from npm"

  # ── Release evidence bundle ────────────────────────────────────────
  release-evidence:
    name: Release evidence
    needs: [ci, resolve-version, publish-crates, publish-npm, verify-publish]
    if: always() && needs.resolve-version.result == 'success'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Generate evidence
        run: |
          cat > evidence.md <<EVIDENCE
          # Release Evidence — v$VERSION

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Tag:** ${{ github.ref }}
          **SHA:** ${{ github.sha }}
          **Triggered by:** ${{ github.event_name }}

          ## Job outcomes

          | Job | Status |
          |-----|--------|
          | CI | ${{ needs.ci.result || 'skipped' }} |
          | Publish crates | ${{ needs.publish-crates.result || 'skipped' }} |
          | Publish npm | ${{ needs.publish-npm.result || 'skipped' }} |
          | Verify | ${{ needs.verify-publish.result || 'skipped' }} |
          EVIDENCE

      - uses: actions/upload-artifact@v4
        with:
          name: release-evidence-v${{ needs.resolve-version.outputs.version }}
          path: evidence.md
